name: Lint Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Get Changed Files for Prettier
        id: prettier-changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.{js,jsx,ts,tsx,json,css,md,yml,yaml}

      - name: Run Prettier Check on Changed Files
        if: steps.prettier-changed-files.outputs.any_changed == 'true'
        run: |
          FILES=""
          for file in ${{ steps.prettier-changed-files.outputs.all_changed_files }}; do
            if [ -f "$file" ]; then
              FILES="$FILES $file"
            fi
          done
          if [ -n "$FILES" ]; then
            npx prettier --check $FILES
          else
            echo "No files to format check."
          fi

      - name: Get Changed Files for ESLint
        id: eslint-changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.{js,jsx,ts,tsx}
            !**/*.d.ts

      - name: Run ESLint on Changed Files
        if: steps.eslint-changed-files.outputs.any_changed == 'true'
        run: |
          FILES=""
          for file in ${{ steps.eslint-changed-files.outputs.all_changed_files }}; do
            if [ -f "$file" ]; then
              FILES="$FILES $file"
            fi
          done
          if [ -n "$FILES" ]; then
            npx eslint $FILES
          else
            echo "No files to lint."
          fi
